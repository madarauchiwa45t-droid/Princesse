name: 🤖 Build Android APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (preview | production)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build-android:
    name: Build Android APK (EAS)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ─── Checkout ────────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ─── Node.js ────────────────────────────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ─── Install deps ───────────────────────────────────────────────
      - name: 📦 Install dependencies
        run: npm ci

      # ─── EAS CLI ────────────────────────────────────────────────────
      - name: 🛠️ Install EAS CLI
        run: npm install -g eas-cli@latest

      # ─── Setup Expo ─────────────────────────────────────────────────
      - name: 🔑 Login to Expo
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ─── Build APK ──────────────────────────────────────────────────
      - name: 🔨 Build Android APK
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          eas build \
            --platform android \
            --profile $PROFILE \
            --non-interactive \
            --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ─── TypeScript check ───────────────────────────────────────────
      - name: 🔍 TypeScript type-check
        run: npm run type-check
        continue-on-error: true

  # ─── Lint ──────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 TypeScript check
        run: npm run type-check
        continue-on-error: true
        
